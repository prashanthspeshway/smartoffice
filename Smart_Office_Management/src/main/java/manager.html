<!-- <%@ page language="java" contentType="text/html; charset=UTF-8"
    pageEncoding="UTF-8"%> -->

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Manager Dashboard</title>

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
/* ===== Global ===== */
* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: "Segoe UI", Arial, sans-serif;
    background: #f1f5f9;
    transition: background 0.3s;
}

body.dark {
    background: #0f172a;
    color: #e5e7eb;
}

/* ===== Top Bar ===== */
.top-bar {
    height: 75px;
    background: linear-gradient(135deg, #17223d, #2a3c66,#29448a);
    color: #fff;
    display: flex;
    align-items: center;
    padding: 0 30px;
}

.user-area {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 15px;
}

.icon-btn {
    background: transparent;
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
}

.logout-btn {
    background: #ef4444;
    border: none;
    padding: 8px 18px;
    border-radius: 20px;
    color: #fff;
    cursor: pointer;
}

/* ===== Layout ===== */
.container {
    display: flex;
    height: calc(100vh - 75px);
}

/* ===== Sidebar ===== */
.left-panel {
    width: 260px;
    background: #ffffff;
    padding: 25px 20px;
    box-shadow: 3px 0 12px rgba(0,0,0,0.08);
}

body.dark .left-panel {
    background: #020617;
}

.nav-btn {
    width: 100%;
    padding: 14px;
    margin-bottom: 14px;
    border: none;
    border-radius: 10px;
    background: #1c42a5;
    color: #eee;
    cursor: pointer;
    font-size: 15px;
}

.nav-btn:hover {
    background: #2563eb;
}

/* ===== Content ===== */
.right-panel {
    flex: 1;
    padding: 30px;
    overflow-y: auto;
}

/* ===== Cards ===== */
.box {
    background: #ffffff;
    padding: 25px 30px;
    border-radius: 16px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.08);
    margin-bottom: 30px;
}

body.dark .box {
    background: #020617;
}

/* ===== Forms ===== */
.form-control {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #d1d5db;
    margin-bottom: 15px;
}

/* ===== Buttons ===== */
.primary-btn {
    background: #22c55e;
    color: #fff;
    padding: 10px 22px;
    border: none;
    border-radius: 22px;
    cursor: pointer;
}

.secondary-btn {
    background: #3b82f6;
    color: #fff;
    padding: 8px 18px;
    border: none;
    border-radius: 18px;
    cursor: pointer;
}

.reject-btn {
    background: #ef4444;
    color: #fff;
    padding: 8px 18px;
    border: none;
    border-radius: 18px;
}

/* ===== Tables ===== */
table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    padding: 12px;
    text-align: center;
}

th {
    background: #2563eb;
    color: #fff;
}
</style>
</head>

<body>

<!-- ===== Top Bar ===== -->
<div class="top-bar">
    <h2>Smart Office • Manager Dashboard</h2>
    <div class="user-area">
        <span>Welcome, <b>${sessionScope.username}</b></span>
        <button class="icon-btn" onclick="showSection('settings')">
            <i class="fa-solid fa-gear"></i>
        </button>
        <a href="<%=request.getContextPath()%>/logout">
            <button class="logout-btn">Logout</button>
        </a>
    </div>
</div>

<div class="container">

<!-- ===== Sidebar ===== -->
<div class="left-panel">
    <button class="nav-btn" onclick="showSection('selfAttendance')">
        <i class="fa-solid fa-user-clock"></i> My Attendance
    </button>
    <button class="nav-btn" onclick="showSection('team')">
        <i class="fa-solid fa-users"></i> Team Profile
    </button>
    <button class="nav-btn" onclick="showSection('assign')">
        <i class="fa-solid fa-list-check"></i> Assign Tasks
    </button>
    <button class="nav-btn" onclick="showSection('attendance')">
        <i class="fa-solid fa-calendar-check"></i> Team Attendance
    </button>
    <button class="nav-btn" onclick="showSection('leave')">
        <i class="fa-solid fa-plane-departure"></i> Leave Requests
    </button>
   
</div>

<!-- ===== Content ===== -->
<div class="right-panel">

<!-- ===== My Attendance ===== -->
<div class="box" id="selfAttendance" style="display:none;">
    <h3>My Attendance</h3>
    <button class="primary-btn" onclick="punchIn()">Punch In</button>
    <button class="reject-btn" onclick="punchOut()">Punch Out</button>
    <p id="punchInTime"></p>
    <p id="punchOutTime"></p>
</div>

<!-- ===== Team ===== -->
<div class="box" id="team" style="display:none;">
    <h3>My Team</h3>
    <p>Team members details here</p>
</div>

<!-- ===== Assign ===== -->
<div class="box" id="assign" style="display:none;">
    <h3>Assign Task</h3>
    <input class="form-control" placeholder="Employee Name">
    <textarea class="form-control" rows="4" placeholder="Task Description"></textarea>
    <button class="primary-btn">Assign Task</button>
</div>

<!-- ===== Attendance ===== -->
<div class="box" id="attendance" style="display:none;">
    <h3>Team Attendance</h3>
</div>

<!-- ===== Leave ===== -->
<div class="box" id="leave" style="display:none;">
    <h3>Leave Requests</h3>
</div>

<!-- ===== SETTINGS ===== -->
<div class="box" id="settings" style="display:none;">
    <h3>Settings</h3>

    <h4>👤 Profile</h4>
    <p><b>Name:</b> ${sessionScope.username}</p>
    <p><b>Role:</b> Manager</p>

    <hr>

    <h4>🔒 Change Password</h4>
    <input type="password" class="form-control" placeholder="Current Password">
    <input type="password" class="form-control" placeholder="New Password">
    <input type="password" class="form-control" placeholder="Confirm Password">
    <button class="secondary-btn">Update Password</button>

    <hr>

    <h4>🎨 Theme</h4>
    <button class="primary-btn" onclick="toggleTheme()">Toggle Dark / Light</button>
</div>

</div>
</div>

<script>
function showSection(id) {
    document.querySelectorAll('.box').forEach(b => b.style.display = 'none');
    document.getElementById(id).style.display = 'block';
}

function punchIn() {
    document.getElementById("punchInTime").innerHTML =
        "<b>Punch In:</b> " + new Date().toLocaleTimeString();
}

function punchOut() {
    document.getElementById("punchOutTime").innerHTML =
        "<b>Punch Out:</b> " + new Date().toLocaleTimeString();
}

function toggleTheme() {
    document.body.classList.toggle("dark");
}
</script>

</body>
</html>
