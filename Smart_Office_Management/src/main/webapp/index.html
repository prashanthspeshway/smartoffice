<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<!-- Font Awesome -->
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
	box-sizing: border-box;
	font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
	margin: 0;
	height: 100vh;
	display: flex;
	align-items: center;
	justify-content: center;
	background: linear-gradient(135deg, #c3cfe2 0%, #e2ebf0 100%);
	color: #333;
}

.login-box {
	width: min(90%, 380px);
	padding: 40px 30px;
	background: rgba(255, 255, 255, 0.155);
	/* background:transparent; */
	backdrop-filter: blur(10px);
	border-radius: 16px;
	box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
	border: 1px solid rgba(255, 255, 255, 0.2);
	transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.login-box:hover {
	transform: translateY(-2px);
	box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
}

.login-box h1 {
	text-align: center;
	margin-bottom: 10px;
	color: #2d3748;
	font-size: 29px;
	font-weight: 700;
	letter-spacing: -0.2px;
}

.login-box label {
	display: block;
	margin-bottom: 8px;
	font-size: 15px;
	color: #000;
	font-weight: 500;
}

.login-box input {
	width: 100%;
	margin-bottom: 16px;
	padding: 12px 16px;
	border-radius: 8px;
	border: 1px solid #000;
	font-size: 15px;
	background: #f7fafc;
	transition: border-color 0.2s ease, box-shadow 0.2s ease,
		background-color 0.2s ease;
}

.login-box input:focus {
	outline: none;
	border-color: #667eea;
	background: #fff;
	box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.login-box input::placeholder {
	color: #444;
}

/* ===== Password Wrapper ===== */
.password-wrapper {
	position: relative;
	margin-bottom: 20px;
}

.password-wrapper input {
	padding-right: 48px;
}

.password-wrapper i {
	position: absolute;
	right: 16px;
	top: 37%;
	transform: translateY(-50%);
	cursor: pointer;
	color: #444;
	transition: color 0.2s ease;
	font-size: 16px;
}

.password-wrapper i:hover {
	color: #667eea;
}

/* ===== Button ===== */
.login-box button {
	width: 100%;
	padding: 12px;
	border: none;
	border-radius: 8px;
	background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
	color: white;
	font-size: 16px;
	font-weight: 500;
	cursor: pointer;
	transition: transform 0.2s ease, box-shadow 0.2s ease;
	letter-spacing: 0.5px;
}

.login-box button i {
	margin-left: 8px;
	transition: transform 0.2s ease;
}

.login-box button:hover {
	transform: translateY(-1px);
	box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
}

.login-box button:active {
	transform: translateY(0);
}

/* ================= TOAST ================= */
.toast {
	position: fixed;
	top: 30px;
	right: 30px;
	background: #e2ebf0;
	color: black;
	padding: 14px 20px 14px 44px;
	border-radius: 10px;
	font-size: 15px;
	font-weight: 500;
	display: none;
	box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
	z-index: 3000;
	line-height: 1.4;
	animation: toastIn 0.45s cubic-bezier(0.4, 0, 0.2, 1);
}

.toast.hide {
	animation: toastOut 0.4s ease forwards;
}

/* Icon */
.toast::before {
	content: "✔";
	position: absolute;
	left: 16px;
	top: 50%;
	transform: translateY(-50%);
	font-size: 16px;
	font-weight: bold;
}

/* ===== TOAST TYPES ===== */

/* SUCCESS */
.toast.success {
	background: #e2ebf0;
	color: black
}

.toast.success::before {
	content: "✔";
}

/* ERROR */
.toast.error {
	background: #e2ebf0;
	color: black
}

.toast.error::before {
	content: "✖";
}

/* Animations */
@keyframes toastIn {from { opacity:0;
	transform: translateX(120px);
}

to {
	opacity: 1;
	transform: translateX(0);
}

}
@keyframes toastOut {from { opacity:1;
	transform: translateX(0);
}

to {
	opacity: 0;
	transform: translateX(120px);
}

}

/* Container animation */
.login-box {
	animation: fadeSlideIn 0.8s ease-out forwards;
}

@keyframes fadeSlideIn {from { opacity:0;
	transform: translateY(30px) scale(0.98);
}

to {
	opacity: 1;
	transform: translateY(0) scale(1);
}

}

/* ===== Background Lines ===== */
.bg-lines {
	position: fixed;
	inset: 0;
	overflow: hidden;
	z-index: -1;
}

.bg-lines span {
	position: absolute;
	width: 2px;
	height: 120%;
	background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.5),
		transparent);
	animation: moveLines 8s linear infinite;
	opacity: 0.4;
}

/* Different positions & speeds */
.bg-lines span:nth-child(1) {
	left: 20%;
	animation-duration: 9s;
}

.bg-lines span:nth-child(2) {
	left: 45%;
	animation-duration: 12s;
}

.bg-lines span:nth-child(3) {
	left: 65%;
	animation-duration: 10s;
}

.bg-lines span:nth-child(4) {
	left: 85%;
	animation-duration: 14s;
}

@keyframes moveLines {from { transform:translateY(-120%);
	
}

to {
	transform: translateY(120%);
}

}
.divider {
	display: flex;
	align-items: center;
	gap: 10px;
	margin: 22px 0 0;
	animation: fieldSlide 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.45s both;
}

.divider-line {
	flex: 1;
	height: 1px;
	background: linear-gradient(90deg, transparent, rgba(100, 120, 160, 0.2),
		transparent);
}

.divider span {
	font-size: 11.5px;
	color: var(--text-light);
	letter-spacing: 0.5px;
	white-space: nowrap;
}

.card-header {
	display: flex;
	align-items: center;
	justify-content: center;
	gap: 12px;
	text-align: center;
	margin-bottom: 10px;
}

.logo-ring {
	display: flex;
	align-items: center;
	justify-content: center;
	width: 35px;
	height: 35px;
	background: linear-gradient(135deg, #667eea, #764ba2);
	border-radius: 12px;
	animation: cardReveal 0.9s cubic-bezier(0.22, 1, 0.36, 1) 0.1s both;
}

.logo-ring i {
	color: #fff;
	font-size: 12px;
}

.card-header h1 {
	margin: 0;
	font-family: "outfit", sans-serif;
	font-size: 28px;
	font-weight: 600;
	color: #2d3748;
	letter-spacing: -0.3px;
	line-height: 1.1;
}

.card-header p {
	text-align: center;
	margin-top: 6px;
	font-size: 13.5px;
	color: black;
	margin-bottom: 25px;
	font-weight: 400;
	letter-spacing: 0.2px;
}
.card-subtitle {
    text-align: center;
    font-size: 13.5px;
    color: black;
    font-family: "Outfit", sans-serif;   
    font-optical-sizing: auto;
   	font-style: normal;
    margin-bottom: 25px;
    font-weight: 400;
    letter-spacing: 0.2px;
    animation: fieldSlide 0.6s cubic-bezier(0.22, 1, 0.36, 1) 0.3s both;
}
</style>
</head>

<body>

	<div class="login-box">
		<div class="card-header">
			<div class="logo-ring">
				<i class="fa-solid fa-user-shield"></i>
			</div>
			<h1>Login</h1>		
		</div>
		<div class="card-subtitle">
		    Please login to your account to continue.
		</div>
		<form action="Login" method="post">
			<label for="username">Username</label> <input type="text"
				id="username" name="username" placeholder="Enter your username"
				required> <label for="password">Password</label>
			<div class="password-wrapper">
				<input type="password" id="password" name="password"
					placeholder="Enter your password" required> <i
					class="fa-solid fa-eye" id="eyeIcon" title="Hold to view password"></i>
			</div>

			<button type="submit">
				Login<i class="fa-solid fa-right-to-bracket"></i>
			</button>
			<div class="divider">
				<div class="divider-line"></div>
				<span>Secured with end-to-end encryption</span>
				<div class="divider-line"></div>
			</div>
		</form>
	</div>

	<!-- TOAST -->
	<div id="toast" class="toast"></div>


	<script>
/* ===== Password View (Hold) ===== */
const eyeIcon = document.getElementById("eyeIcon");
const password = document.getElementById("password");

eyeIcon.addEventListener("mousedown", () => password.type = "text");
eyeIcon.addEventListener("mouseup", () => password.type = "password");
eyeIcon.addEventListener("mouseleave", () => password.type = "password");

eyeIcon.addEventListener("touchstart", () => password.type = "text");
eyeIcon.addEventListener("touchend", () => password.type = "password");

/* ===== TOASTER FUNCTION ===== */
function showToast(message, type = "success") {
    const toast = document.getElementById("toast");

    // FULL reset
    toast.style.display = "none";
    toast.className = "toast"; 
    toast.offsetHeight; // force reflow (important!)

    // Apply new state
    toast.classList.add(type);
    toast.textContent = message;
    toast.style.display = "block";

    setTimeout(() => {
        toast.classList.add("hide");

        setTimeout(() => {
            toast.style.display = "none";
            toast.className = "toast"; // reset completely
        }, 400);
    }, 2500);
}

/* ===== Read URL Error ===== */
const params = new URLSearchParams(window.location.search);
const error = params.get("error");

if (error === "invalid") {
	showToast("Invalid username or password", "error");
}
else if (error === "inactive") {
    showToast("Your account is inactive. Contact admin.", "error");
}
else if (error === "invalidRole") {
    showToast("Invalid role assigned. Contact admin.", "error");
}
else if (error === "server") {
    showToast("Server error. Please try again later.", "error");
}
else if (error === "weakPassword") {
    showToast(
        "Password must be at least 8 characters with uppercase, lowercase, number, and symbol",
        "error"
    );
}

const logout = params.get("logout");

if (logout === "success") {
    showToast("Logged-out successfully", "success");

    // Optional: clean URL after showing toast
    window.history.replaceState({}, document.title, window.location.pathname);
}

document.addEventListener('contextmenu', e => e.preventDefault());
document.onkeydown = e =>
  e.keyCode === 123 || (e.ctrlKey && e.shiftKey && ['I','J','C'].includes(e.key.toUpperCase()))
    ? false
    : true;

</script>

</body>
</html>
