<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<!-- Font Awesome -->
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
box-sizing: border-box;
font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
margin: 0;
height: 100vh;
display: flex;
align-items: center;
justify-content: center;
background: linear-gradient(135deg, #c3cfe2 0%, #e2ebf0 100%);
color: #333;
}

.login-box {
width: min(90%, 380px);
padding: 40px 30px;
background: rgba(255, 255, 255, 0.155); 
/* background:transparent; */
backdrop-filter: blur(10px);
border-radius: 16px;
box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
border: 1px solid rgba(255, 255, 255, 0.2);
transition: transform 0.3s ease, box-shadow 0.3s ease;
}

.login-box:hover {
transform: translateY(-2px);
box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
}

.login-box h1 {
text-align: center;
margin-top: -10px;
margin-bottom: 20px;
color: #2d3748;
font-size: 29px;
font-weight: 700;
letter-spacing: -0.2px;
}

.login-box label {
display: block;
margin-bottom: 8px;
font-size: 15px;
color: #000;
font-weight: 500;
}

.login-box input {
width: 100%;
margin-bottom: 16px;
padding: 12px 16px;
border-radius: 8px;
border: 1px solid #000;
font-size: 15px;
background: #f7fafc;
transition: border-color 0.2s ease, box-shadow 0.2s ease, background-color 0.2s ease;
}

.login-box input:focus {
outline: none;
border-color: #667eea;
background: #fff;
box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

.login-box input::placeholder {
color: #444;
}

/* ===== Password Wrapper ===== */
.password-wrapper {
position: relative;
margin-bottom: 20px;
}

.password-wrapper input {
padding-right: 48px;
}

.password-wrapper i {
position: absolute;
right: 16px;
top: 37%;
transform: translateY(-50%);
cursor: pointer;
color: #444;
transition: color 0.2s ease;
font-size: 16px;
}

.password-wrapper i:hover {
color: #667eea;
}

/* ===== Button ===== */
.login-box button {
width: 100%;
padding: 12px;
border: none;
border-radius: 8px;
background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
color: white;
font-size: 16px;
font-weight: 500;
cursor: pointer;
transition: transform 0.2s ease, box-shadow 0.2s ease;
letter-spacing: 0.5px;
}

.login-box button:hover {
transform: translateY(-1px);
box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
}

.login-box button:active {
transform: translateY(0);
}

/* ===== TOASTER ===== */
#toast {
position: fixed;
top: 20px;
right: 20px;
min-width: 280px;
padding: 16px 20px;
border-radius: 10px;
color: white;
font-size: 14px;
font-weight: 500;
box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
display: none;
z-index: 999;
animation: slideIn 0.3s ease-out;
}

@keyframes slideIn {
from {
transform: translateX(100%);
opacity: 0;
}
to {
transform: translateX(0);
opacity: 1;
}
}

#toast.success {
background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
}

#toast.error {
background: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
}
</style>
</head>

<body>

<div class="login-box">
<h1>Login</h1>
<form action="Login" method="post">
<label for="username">Username</label> 
<input type="text" id="username" name="username" placeholder="Enter your username" required>
<label for="password">Password</label>
<div class="password-wrapper">
<input type="password" id="password" name="password" placeholder="Enter your password" required>
<i class="fa-solid fa-eye" id="eyeIcon" title="Hold to view password"></i>
</div>

<button type="submit">Login</button>
</form>
</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
/* ===== Password View (Hold) ===== */
const eyeIcon = document.getElementById("eyeIcon");
const password = document.getElementById("password");

eyeIcon.addEventListener("mousedown", () => password.type = "text");
eyeIcon.addEventListener("mouseup", () => password.type = "password");
eyeIcon.addEventListener("mouseleave", () => password.type = "password");

eyeIcon.addEventListener("touchstart", () => password.type = "text");
eyeIcon.addEventListener("touchend", () => password.type = "password");

/* ===== TOASTER FUNCTION ===== */
function showToast(message, type) {
    const toast = document.getElementById("toast");
    toast.innerText = message;

    toast.className = type === "error" ? "error" : "success";

    toast.style.display = "block";

    setTimeout(() => {
        toast.style.display = "none";
    }, 3000);
}

/* ===== Read URL Error ===== */
const params = new URLSearchParams(window.location.search);
const error = params.get("error");

if (error === "invalid") {
    showToast("Invalid username or password", "error");
}
else if (error === "inactive") {
    showToast("Your account is inactive. Contact admin.", "error");
}
else if (error === "invalidRole") {
    showToast("Invalid role assigned. Contact admin.", "error");
}
else if (error === "server") {
    showToast("Server error. Please try again later.", "error");
}
else if (error === "weakPassword") {
    showToast(
        "Password must be at least 8 characters with uppercase, lowercase, number, and symbol",
        "error"
    );
}

const logout = params.get("logout");

if (logout === "success") {
    showToast("Logged out successfully", "success");

    // clean URL so toast doesn't repeat on refresh
    window.history.replaceState(
        {},
        document.title,
        window.location.pathname
    );
}

</script>

</body>
</html>
