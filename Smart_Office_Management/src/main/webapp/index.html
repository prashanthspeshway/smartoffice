<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f6f9;
        }

        .login-box {
            width: 350px;
            padding: 30px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .login-box h1 {
            text-align: center;
            margin-bottom: 25px;
            color: #333;
        }

        .login-box label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #555;
        }

        .login-box input {
            width: 100%;
            padding: 10px;
            margin-bottom: 18px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        .login-box input:focus {
            outline: none;
            border-color: #4f46e5;
        }

        .login-box button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 6px;
            background: #4f46e5;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        .login-box button:hover {
            background: #4338ca;
        }
    </style>
</head>

<body>
    <div class="login-box">
        <h1>Login</h1>

        <form action="Login" method="post">
            <label>Username</label>
            <input type="text" name="username" required>

            <label>Password</label>
            <input type="password" name="password" required>

            <button type="submit">Login</button>
        </form>
    </div>
    
    <script>
    	const params = new URLSearchParams(window.location.search);
    	const error = params.get("error");

    	if (error === "invalid") {
      	  alert("Invalid username or password!");
    	} else if (error === "server") {
    	    alert("Server error. Please try again later.");
   	 	} else if (error === "invalidRole") {
    	    alert("Invalid user role. Contact admin.");
    	}
	</script>
    
    
</body>
</html>
